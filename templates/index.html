<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TexCompiler | Premium LaTeX Service</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js" type="text/javascript" charset="utf-8"></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <line x1="10" y1="9" x2="8" y2="9"></line>
                </svg>
                TexCompiler
            </div>
            <div class="status-glow" title="Server Online"></div>
        </div>
        
        <div class="controls">
            <div class="control-item">
                <span class="control-label">Engine</span>
                <select id="compiler">
                    <option value="pdflatex">pdfLaTeX</option>
                    <option value="xelatex">XeLaTeX</option>
                    <option value="lualatex">LuaLaTeX</option>
                </select>
            </div>
            <button id="compile-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Compile Now
            </button>
        </div>
    </header>

    <div class="mobile-tabs">
        <button class="mobile-tab-btn active" onclick="switchTab('editor-pane')">Code</button>
        <button class="mobile-tab-btn" onclick="switchTab('preview-pane')">Preview</button>
    </div>

    <main>
        <div id="editor-pane" class="pane active">
            <div class="pane-header">
                <span>Source Editor</span>
                <span>main.tex</span>
            </div>
            <div id="editor" style="flex: 1;"></div>
            
            <div class="terminal">
                <div class="pane-header" style="border-top: 1px solid var(--border-color); border-bottom: none;">
                    <span>Build Console</span>
                </div>
                <div id="terminal-content">Waiting for input...</div>
            </div>
        </div>

        <div id="preview-pane" class="pane">
            <div class="pane-header">
                <span>PDF Preview</span>
                <span id="page-count">Ready</span>
            </div>
            <div class="preview-container">
                <div id="loader" class="loader-overlay">
                    <div class="spinner"></div>
                </div>
                <iframe id="pdf-viewer" src="about:blank"></iframe>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
