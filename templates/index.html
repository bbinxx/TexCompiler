<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="{{ version }}">
    <title>TexCompiler - LaTeX Editor</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js" type="text/javascript" charset="utf-8"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <button id="menu-toggle" class="header-btn" title="Toggle file explorer">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span>TexCompiler</span>
            </div>
            <span class="status-dot" title="Server online"></span>
            <span class="version-badge">v{{ version }}</span>
        </div>
        <div class="header-right">
            <div class="compiler-select">
                <label for="compiler">Engine</label>
                <select id="compiler">
                    <option value="">Loading...</option>
                </select>
            </div>
            <button id="save-btn" class="header-btn" title="Save (Ctrl+S)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            </button>
            <button id="image-btn" class="header-btn" title="Insert image">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <button id="compile-btn">
                <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <svg class="spinner-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"/>
                </svg>
                Compile
            </button>
            <button id="settings-btn" class="header-btn" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="mobile-tabs">
        <button class="mobile-tab-btn active" data-pane="editor-pane">Editor</button>
        <button class="mobile-tab-btn" data-pane="preview-pane">Preview</button>
    </div>

    <div class="app-layout">
        <aside id="explorer-panel" class="explorer-panel">
            <div id="explorer-content" class="explorer-content"></div>
        </aside>

        <main>
            <section id="editor-pane" class="pane active">
                <div class="pane-header">
                    <span class="pane-title" id="editor-title">Source Editor</span>
                    <span class="pane-badge" id="editor-filename">main.tex</span>
                </div>
                <div class="editor-container">
                    <div id="editor"></div>
                </div>
                <div class="terminal">
                    <div class="terminal-header">
                        <span>Build Console</span>
                        <div class="terminal-actions">
                            <button class="term-btn" id="term-copy" title="Copy output">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            </button>
                            <button class="term-btn" id="term-clear" title="Clear console">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    </div>
                    <div id="terminal-content"></div>
                </div>
            </section>

            <section id="preview-pane" class="pane">
                <div class="pane-header">
                    <span class="pane-title">PDF Preview</span>
                    <span id="page-count" class="pane-badge">Ready</span>
                </div>
                <div class="preview-container">
                    <div id="loader" class="loader-overlay">
                        <div class="loader-spinner"></div>
                    </div>
                    <iframe id="pdf-viewer" src="about:blank" title="PDF Preview"></iframe>
                </div>
            </section>
        </main>
    </div>

    <div id="settings-modal" class="modal-overlay" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <span>Settings</span>
                <button id="settings-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <label class="settings-field">
                    <span class="settings-label">Workspace Folder</span>
                    <span class="settings-desc">Choose a folder on your device to store and edit LaTeX files. Files are read and written directly from your local filesystem.</span>
                    <div style="display:flex;align-items:center;gap:10px;margin-top:6px;">
                        <button id="settings-pick-folder" class="settings-btn">Select Folder</button>
                        <span id="settings-folder-label" class="settings-folder-name">None selected</span>
                    </div>
                </label>
                <div id="settings-status" class="settings-status"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
